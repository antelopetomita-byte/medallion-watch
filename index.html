<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B1017">
<title>MEDALLION//WATCH</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1017; --panel:#121A24; --panel2:#0E1520; --line:#1E2A38;
  --tx:#D8E2EC; --mut:#5A6B7E; --amber:#FFB454;
  --up:#3DDCA3; --dn:#FF5C7A;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans JP',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;
  padding:max(14px,env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom))}
.wrap{max-width:560px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:baseline;padding:6px 2px 16px}
h1{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.14em;color:var(--amber)}
h1 span{color:var(--mut)}
#clock{font-family:var(--mono);font-size:11px;color:var(--mut)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
.lbl{font-size:10px;letter-spacing:.18em;color:var(--mut);font-family:var(--mono);margin-bottom:6px}
.nav-big{font-family:var(--mono);font-size:40px;font-weight:600;line-height:1.1;font-variant-numeric:tabular-nums}
.nav-sub{font-family:var(--mono);font-size:13px;margin-top:4px}
.up{color:var(--up)} .dn{color:var(--dn)} .amber{color:var(--amber)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kv{font-family:var(--mono);font-size:16px;font-weight:500;font-variant-numeric:tabular-nums}
.kv small{font-size:10px;color:var(--mut);font-weight:400}
/* signal meter */
.meter{position:relative;height:54px;margin-top:10px}
.meter-track{position:absolute;top:24px;left:0;right:0;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--dn),var(--line) 30%,var(--line) 70%,var(--up))}
.meter-thr{position:absolute;top:16px;width:2px;height:22px;background:var(--amber);opacity:.85}
.meter-thr::after{content:'発火線';position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--amber);font-family:var(--mono);white-space:nowrap}
.meter-needle{position:absolute;top:12px;width:3px;height:30px;background:var(--tx);border-radius:2px;
  box-shadow:0 0 10px rgba(255,180,84,.5);transition:left .8s cubic-bezier(.2,.8,.2,1)}
.meter-scale{position:absolute;top:38px;width:100%;display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:9px;color:var(--mut)}
canvas{width:100%;height:120px;display:block}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{color:var(--mut);font-weight:400;text-align:left;padding:4px 6px;border-bottom:1px solid var(--line);letter-spacing:.06em}
td{padding:6px;border-bottom:1px solid var(--panel2);font-variant-numeric:tabular-nums;white-space:nowrap}
tr.hit td{color:var(--amber)}
.pill{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10px;border:1px solid var(--line)}
.pill.L{color:var(--up);border-color:var(--up)} .pill.S{color:var(--dn);border-color:var(--dn)}
button{font-family:var(--mono);font-size:12px;letter-spacing:.1em;background:none;color:var(--amber);
  border:1px solid var(--amber);border-radius:8px;padding:10px 16px;width:100%;cursor:pointer}
button:active{background:rgba(255,180,84,.12)}
input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  color:var(--tx);font-family:var(--mono);font-size:13px;padding:12px;margin:10px 0}
input:focus{outline:none;border-color:var(--amber)}
#gate p{font-size:12px;color:var(--mut);line-height:1.7}
.err{color:var(--dn);font-size:12px;font-family:var(--mono);margin-top:8px;display:none}
.foot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--mut);padding-top:8px}
.skel{color:var(--mut)}
@media (prefers-reduced-motion:reduce){.meter-needle{transition:none}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>MEDALLION<span>//</span>WATCH</h1><div id="clock"></div></header>

<div id="gate" class="card" style="display:none">
  <div class="lbl">ACCESS</div>
  <p>非公開リポジトリ <b>medallion-fx</b> のログを読むため、GitHubトークンを入力してください。トークンはこの端末のみに保存されます。</p>
  <input id="tok" type="password" placeholder="ghp_..." autocomplete="off">
  <button onclick="saveTok()">接続する</button>
  <div class="err" id="gateErr">接続できません。トークンを確認してください。</div>
</div>

<div id="app" style="display:none">
  <div class="card">
    <div class="lbl">仮想口座 NAV（開始 ¥300,000）</div>
    <div class="nav-big" id="nav">—</div>
    <div class="nav-sub" id="pl">—</div>
  </div>

  <div class="card">
    <div class="lbl">シグナルメーター（直近バー）</div>
    <div class="meter" id="meter">
      <div class="meter-track"></div>
      <div class="meter-thr" id="thrL"></div>
      <div class="meter-thr" id="thrR"></div>
      <div class="meter-needle" id="needle" style="left:50%"></div>
      <div class="meter-scale"><span>売り −3σ</span><span>0</span><span>+3σ 買い</span></div>
    </div>
    <div class="kv" style="margin-top:6px" id="zline">—</div>
  </div>

  <div class="grid2">
    <div class="card"><div class="lbl">ポジション</div><div class="kv" id="pos">—</div></div>
    <div class="card"><div class="lbl">最終判断</div><div class="kv" id="lastAct">—</div></div>
  </div>

  <div class="card">
    <div class="lbl">エクイティカーブ（NAV推移）</div>
    <canvas id="eq" width="600" height="240"></canvas>
  </div>

  <div class="card">
    <div class="lbl">判断ログ（直近15件）</div>
    <div style="overflow-x:auto"><table id="tbl">
      <thead><tr><th>時刻(UTC)</th><th>z</th><th>閾値</th><th>アクション</th><th>NAV</th></tr></thead>
      <tbody></tbody>
    </table></div>
  </div>

  <div class="card" style="padding:12px 16px">
    <div class="lbl">モデル</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--mut);line-height:1.8" id="meta">—</div>
  </div>

  <button onclick="loadAll()">更新する</button>
  <div class="err" id="appErr"></div>
</div>

<div class="foot">EURUSD H1 · ensemble ML · paper 3x · PCW 2026</div>
</div>

<script>
var REPO='antelopetomita-byte/medallion-fx';
var KEY='mdw_token';
var yen=function(v){return '¥'+Math.round(v).toLocaleString('ja-JP')};

function tok(){return localStorage.getItem(KEY)||''}
function saveTok(){
  var t=document.getElementById('tok').value.trim();
  if(!t)return;
  localStorage.setItem(KEY,t);
  boot();
}
function gh(path){
  return fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,
    {headers:{'Authorization':'token '+tok(),'Accept':'application/vnd.github+json'}})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})
    .then(function(j){return decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))});
}
function parseCSV(t){
  var lines=t.trim().split('\n');
  var head=lines[0].split(',');
  return lines.slice(1).map(function(l){
    var c=l.split(','),o={};
    head.forEach(function(h,i){o[h]=c[i]});
    return o;
  });
}
function drawEq(rows){
  var cv=document.getElementById('eq'),ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  var vals=rows.map(function(r){return parseFloat(r.nav_jpy)}).filter(function(v){return !isNaN(v)});
  if(vals.length<2){ctx.fillStyle='#5A6B7E';ctx.font='20px IBM Plex Mono';
    ctx.fillText('データ蓄積中…',20,H/2);return}
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(mx-mn<1){mn-=500;mx+=500}
  var pad=14;
  // baseline 300k
  var by=H-pad-(300000-mn)/(mx-mn)*(H-2*pad);
  if(by>pad&&by<H-pad){
    ctx.strokeStyle='#1E2A38';ctx.setLineDash([4,4]);ctx.beginPath();
    ctx.moveTo(0,by);ctx.lineTo(W,by);ctx.stroke();ctx.setLineDash([]);
  }
  var last=vals[vals.length-1];
  ctx.strokeStyle=last>=300000?'#3DDCA3':'#FF5C7A';
  ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.beginPath();
  vals.forEach(function(v,i){
    var x=i/(vals.length-1)*W;
    var y=H-pad-(v-mn)/(mx-mn)*(H-2*pad);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.stroke();
}
function loadAll(){
  var errEl=document.getElementById('appErr');errEl.style.display='none';
  Promise.all([
    gh('live/paper_account.json').catch(function(){return null}),
    gh('live/trades_log.csv').catch(function(){return null}),
    gh('live/state.json').catch(function(){return null}),
    gh('live/model_meta.json').catch(function(){return null})
  ]).then(function(res){
    var acct=res[0]?JSON.parse(res[0]):null;
    var rows=res[1]?parseCSV(res[1]):[];
    var st=res[2]?JSON.parse(res[2]):null;
    var meta=res[3]?JSON.parse(res[3]):null;

    var nav=rows.length?parseFloat(rows[rows.length-1].nav_jpy):(acct?acct.balance_jpy:300000);
    document.getElementById('nav').textContent=yen(nav);
    var pl=nav-300000,plp=pl/300000*100;
    var plEl=document.getElementById('pl');
    plEl.textContent=(pl>=0?'+':'')+yen(pl).replace('¥-','−¥')+' （'+(pl>=0?'+':'')+plp.toFixed(2)+'%）'
      +(acct?'　実現損益 '+yen(acct.realized_jpy):'');
    plEl.className='nav-sub '+(pl>=0?'up':'dn');

    if(rows.length){
      var r=rows[rows.length-1];
      var z=parseFloat(r.z),thr=parseFloat(r.thr);
      var clip=Math.max(-3,Math.min(3,z));
      document.getElementById('needle').style.left=((clip+3)/6*100)+'%';
      document.getElementById('thrL').style.left=((3-thr)/6*100)+'%';
      document.getElementById('thrR').style.left=((3+thr)/6*100)+'%';
      document.getElementById('zline').innerHTML=
        'z = <span class="amber">'+z.toFixed(2)+'</span> / 発火 ±'+thr.toFixed(2)
        +'　<small>'+r.time+' UTC</small>';
      document.getElementById('lastAct').textContent=r.action;
    }else{
      document.getElementById('zline').innerHTML='<span class="skel">市場オープン待ち — 平日毎時5分に更新</span>';
      document.getElementById('lastAct').textContent='待機中';
    }

    var u=st?st.position:0;
    document.getElementById('pos').innerHTML=
      u>0?'<span class="pill L">LONG</span> EURUSD':
      u<0?'<span class="pill S">SHORT</span> EURUSD':'フラット';

    drawEq(rows);

    var tb=document.querySelector('#tbl tbody');tb.innerHTML='';
    rows.slice(-15).reverse().forEach(function(r){
      var tr=document.createElement('tr');
      if(r.trigger==='True')tr.className='hit';
      tr.innerHTML='<td>'+r.time.slice(5,16)+'</td><td>'+parseFloat(r.z).toFixed(2)
        +'</td><td>'+parseFloat(r.thr).toFixed(2)+'</td><td>'+r.action
        +'</td><td>'+yen(parseFloat(r.nav_jpy))+'</td>';
      tb.appendChild(tr);
    });
    if(!rows.length)tb.innerHTML='<tr><td colspan="5" class="skel">まだ判断ログがありません</td></tr>';

    document.getElementById('meta').innerHTML=meta?
      '学習日時: '+meta.trained_at.slice(0,16).replace('T',' ')+' UTC<br>'
      +'学習バー数: '+meta.train_bars.toLocaleString()+'　予測履歴: '+meta.predhist_bars.toLocaleString()
      +'<br>最終学習バー: '+meta.last_bar:'モデル未生成（初回実行待ち）';
  }).catch(function(e){
    errEl.textContent='読み込みエラー: '+e.message+'（トークン失効の可能性）';
    errEl.style.display='block';
    if(String(e.message)==='401'){localStorage.removeItem(KEY);boot()}
  });
}
function boot(){
  var has=!!tok();
  document.getElementById('gate').style.display=has?'none':'block';
  document.getElementById('app').style.display=has?'block':'none';
  if(has)loadAll();
}
setInterval(function(){
  var d=new Date();
  document.getElementById('clock').textContent=
    d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' JST';
},1000);
setInterval(function(){if(tok())loadAll()},300000);
boot();
</script>
</body>
</html>
